[build]
  command = "npm run build"
  publish = "dist/public"
  # Optional: forces a Node version during build if you prefer
  # environment = { NODE_VERSION = "20" }

# Ensure single-page app routing works (client-side routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Example caching rules for static assets (optional)
[[headers]]
  for = "/*.(js|css|svg|png|jpg|jpeg|gif|webp)"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"